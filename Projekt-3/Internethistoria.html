<script>
  /* When the user clicks on the button, 
  toggle between hiding and showing the dropdown content */
  function myFunction() {
      const dropdown = document.getElementById("myDropdown");
      const btn = document.querySelector(".dropbtn i");

      // Toggle dropdown
      dropdown.classList.toggle("show");

      // Toggle button background
      btn.closest('.dropbtn').classList.toggle("active");

      // Toggle icon (keep fa-solid)
      if (btn.classList.contains("fa-bars")) {
        btn.classList.remove("fa-bars");
        btn.classList.add("fa-xmark");
      } else {
        btn.classList.remove("fa-xmark");
        btn.classList.add("fa-bars");
    }
  }
  
  function toggleMenu() {
    const btn = document.getElementById("menuBtn");

    btn.classList.toggle("fa-bars");   // hamburger
    btn.classList.toggle("fa-xmark");  // close icon
  }

  // Close the dropdown if the user clicks outside of it
  window.onclick = function (event) {
    if (!event.target.closest('.dropbtn')) {
      var dropdowns = document.getElementsByClassName("dropdown-content");
      var i;
      for (i = 0; i < dropdowns.length; i++) {
        var openDropdown = dropdowns[i];
        if (openDropdown.classList.contains('show')) {
          openDropdown.classList.remove('show');
                    // Reset button background
          const btn = document.querySelector(".dropbtn i");
          btn.closest('.dropbtn').classList.remove("active");

          // Reset icon to hamburger
          btn.classList.add("fa-bars");
          btn.classList.remove("fa-xmark");
        }
      }
    }
  }
</script>
</body>
