<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Armadillo Quiz</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="wood-bg"><img src="content/signs_and_backdrops/wood_bg_1.png" alt=""></div>
  <div class="back-arrow"><a href="../quiz_intro_page/index.html"><img src="content/signs_and_backdrops/vintage_arrow.png" alt=""></a></div>
<div class="quiz-container">
  <div class="paper-bg"><img src="content/signs_and_backdrops/paper_bg_long.png" alt=""></div>
  <div id="quiz-ui">
  <div class="quiz-header">
    <h1>The Armadillo Quiz</h1>
    <img src="content/signs_and_backdrops/ornate_underline.svg" alt="">
    <div class="progress">
      <div class="progress-bar"></div>
    </div> 
  </div>

  <div id="question-container">
    <div id="question-counter" class="question-counter">
    Question: 1/10
    </div>

    <h2 id="question"></h2>

    <div class="question-image">
      <img id="question-img" src="" alt="Question_image">
    </div>

    <div id="timer" class="timer">30s</div>

    <div id="options" class="options"></div>

  </div>

  <div class="quiz-footer">
    <button id="next-btn">Next</button>
  </div>
  </div>

  <!-- LOSE SCREEN -->
  <div id="lose-screen" class="hidden result-screen">
    <h2>You Lost!</h2>
    <p id="lose-message"></p>

    <div class="result-buttons">
      <button id="review-btn">Review Answers</button>
      <button id="restart-btn">Play Again</button>

      <button id="menu-btn">Main Menu</button>
    </div>
  </div>

  <!-- WIN SCREEN -->
  <div id="win-screen" class="hidden result-screen">
    <h2>You Win!</h2>
    <p id="final-score"></p>

    <div class="result-buttons">
      <button id="review-btn-win">Review Answers</button>
      <button id="restart-btn-win">Play Again</button>

      <button id="menu-btn-win">Main Menu</button>
    </div>
  </div>

  <!-- REVIEW SCREEN -->
  <div id="review-screen" class="hidden">
    <h2>Review Answers</h2>

    <div id="review-content"></div>

    <button id="back-btn">Back</button>
  </div>

</div>

<script src="quiz.js"></script>
</body>
</html>
