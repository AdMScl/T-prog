<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <title>RDRII CAPTURES</title>
  <link rel="stylesheet" href="lightbox.css">
</head>
<body>

  <section>
    <nav><h3>My Captures</h3></nav>
    <div class="upperSection">
      <a class="example-image-link" href="captures/rdr2-shenanigans.png" data-lightbox="example-1"><img class="example-image" src="captures/rdr2-shenanigans.png" alt="image-1" /></a>
      <a class="example-image-link" href="captures/rdr2-theGang.png" data-lightbox="example-2" data-title="Optional caption."><img class="example-image" src="captures/rdr2-theGang.png" alt="image-1"/></a>
    </div>

    <hr />

    <h3>Some more captures</h3>
    
      <div class="lowerSection">
        <div class="lowerSection-top">
        <a class="example-image-link" href="captures/rdr2-fish.png" data-lightbox="example-set" data-title="Click the right half of the image to move forward.">
        <img class="example-image" src="captures/rdr2-fish.png" alt=""/></a>
        <a class="example-image-link" href="captures/rdr2-horseCliff.png" data-lightbox="example-set" data-title="Or press the right arrow on your keyboard.">
        <img class="example-image" src="captures/rdr2-horseCliff.png" alt="" /></a>
        </div>
        <div class="lowerSection-bottom">
        <a class="example-image-link" href="captures/rdr2-horseJump.png" data-lightbox="example-set" data-title="The next image in the set is preloaded as you're viewing.">
        <img class="example-image" src="captures/rdr2-horseJump.png" alt="" /></a>
        <a class="example-image-link" href="captures/rdr2-lasso.png" data-lightbox="example-set" data-title="Click anywhere outside the image or the X to the right to close.">
        <img class="example-image" src="captures/rdr2-lasso.png" alt="" /></a>
        </div>
      </div>
    

  </section>

    <script src="lightbox-plus-jquery.js"></script>

  <!-- <script src="../bower_components/jquery/dist/jquery.js"></script>
  <script src="../src/js/lightbox.js"></script> -->
  

  

</body>
</html>
