<script>

const armadilloData = {
  torso: {
    title: "The armadillo's torso",
    description:
      "An armadillo’s torso is protected by a tough shell made of bony plates called scutes. These plates are covered with keratin, the same material found in human fingernails and hair. The shell helps protect the animal from predators and rough environments. <br><br> In many species, flexible bands across the torso allow the armadillo to move and curl its body while still staying protected. The torso also helps regulate heat, since armadillos have relatively low body fat and low metabolic rates."
  },

  feet: {
    title: "The armadillo's feet",
    description:
      "Armadillos have strong feet with large curved claws that are specially adapted for digging. Their front feet are powerful enough to tear into soil, termite mounds, and ant nests in search of food. <br><br> The claws also help them build underground burrows where they sleep and hide from predators. Some species, such as the giant armadillo, have extremely large claws that can grow several inches long."
  },

  tail: {
    title: "The armadillo's tail",
    description:
      "The armadillo’s tail is covered with armored plates similar to the shell on its back. The tail helps with balance and stability while walking or digging. <br><br> It can also provide extra protection from predators by shielding vulnerable areas of the body. In some species, the tail is thick and muscular, helping the animal maneuver through tunnels and rough terrain."
  },

  head: {
    title: "The armadillo's head",
    description:
      "An armadillo’s head is small, narrow, and partly protected by armored plates. Its pointed shape helps the animal push through soil and leaf litter while searching for insects. Armadillos have relatively small brains and simple teeth, but their head structure is excellent for digging and sniffing out prey underground."
  },

  ears: {
    title: "The armadillo's ears",
    description:
    "Armadillos have large ears with sensitive hearing that help them detect predators and locate movement underground. Because their eyesight is poor, they rely heavily on hearing and smell to understand their surroundings. The ears can also help release body heat in warm climates."
  },

  eye: {
    title: "The armadillo's eye",
    description:
      "Armadillos have small eyes and fairly poor eyesight compared to many mammals. Instead of depending on vision, they mainly rely on their excellent sense of smell and hearing. Their limited eyesight is still useful for detecting light, movement, and nearby obstacles while traveling or foraging."
  },

  snoot: {
    title: "The armadillo's snout",
    description:
      "The armadillo’s long snout contains an extremely powerful sense of smell. It uses this snuot to sniff out insects such as ants, termites, and beetles hidden underground. The pointed shape also helps the animal root through dirt and leaves while searching for food. Many armadillos pair their sensitive snout with a long sticky tongue to capture insects quickly."
  }
};
const infoBox = document.getElementById("info-box");

document.querySelectorAll(".part").forEach(part => {
  part.addEventListener("click", () => {
    const id = part.id;
    const data = armadilloData[id];

    infoBox.innerHTML = `
      <h3>${data.title}</h3>
      <p>${data.description}</p>
    `;
    document.querySelector(".sources").style.display = "block";

  });
});
</script>
